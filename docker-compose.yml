services:
  # ─── Auth Service (Go) ────────────────────────────────────────────
  auth:
    build: ./backend/auth
    container_name: library-auth
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@auth-db:5432/library_auth?sslmode=disable
      USER_SERVICE_URL: http://user:8081
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - library-net

  # ─── User Service (Spring Boot) ───────────────────────────────────
  user:
    build: ./backend/user
    container_name: library-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/library_user
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth:8080
    depends_on:
      user-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - library-net

  # ─── Book Service (NestJS) ────────────────────────────────────────
  book:
    build: ./backend/book
    container_name: library-book
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@book-db:5432/library_book
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8082
    volumes:
      - book_uploads:/app/uploads
    depends_on:
      book-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - library-net

  # ─── Frontend (Next.js) ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: library-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_URL: http://localhost:8080
      NEXT_PUBLIC_USER_URL: http://localhost:8081
      NEXT_PUBLIC_BOOK_URL: http://localhost:8082
    depends_on:
      - auth
      - user
      - book
    restart: unless-stopped
    networks:
      - library-net

  # ─── Databases ────────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: library-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: library_auth
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./backend/auth/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  user-db:
    image: postgres:16-alpine
    container_name: library-user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: library_user
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./backend/user/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

  book-db:
    image: postgres:16-alpine
    container_name: library-book-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: library_book
    volumes:
      - book_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library-net

volumes:
  auth_db_data:
  user_db_data:
  book_db_data:
  book_uploads:

networks:
  library-net:
    driver: bridge
