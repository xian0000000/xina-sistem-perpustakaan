# docker-compose.yml
version: '3.8'

services:
  app:
    build: .
    container_name: library-auth
    image: auth-xina
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/library_auth?sslmode=disable
      APP_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy  # tunggu postgres ready dulu
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: library-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: library_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data  # data ga hilang kalau container restart
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # auto buat tabel saat pertama jalan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: